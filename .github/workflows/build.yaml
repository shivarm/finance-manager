name: Node.js CI

on:
  push:
    branches:
      - main
  pull_request:

jobs: 
  build:
    runs-on: ubuntu-latest
    strategy:
     matrix:
      node-version: [24, 26]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build
        run: npm run build --if-present